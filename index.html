<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Games Hub</title>
    <!-- Google Piksel Şrifti -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="welcome-container">
        <!-- Tam Mərkəzdə Xoş Gəldin Yazısı -->
        <h1 class="neon-title" data-text="WELCOME TO PIXEL HUB">WELCOME TO PIXEL HUB</h1>
        
        <!-- Axtarışa Başla düyməsi və ya başlıq -->
        <p class="subtitle">CHOOSE A PLATFORM TO START SEARCHING</p>

        <!-- 4 Əsas Seçənək (Kнопка / Kart şəklində) -->
        <div class="options-grid">
            <button class="neon-option-btn" onclick="selectPlatform('pixelplanet')">pixelplanet.fun</button>
            <button class="neon-option-btn" onclick="selectPlatform('pixuniverse')">pixuniverse</button>
            <button class="neon-option-btn" onclick="selectPlatform('pixmap')">pixmap</button>
            <button class="neon-option-btn" onclick="selectPlatform('pixelya')">pixelya</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
